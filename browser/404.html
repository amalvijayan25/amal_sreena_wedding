<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redirecting...</title>
    <script>
      // SPA fallback for GitHub Pages
      // This script handles 404s by redirecting to index.html with the original path
      const path = window.location.pathname.replace(/\/$/, '') || '/';
      const search = window.location.search || '';
      const hash = window.location.hash || '';
      
      // Store the redirect path in sessionStorage
      sessionStorage.redirect = path + search + hash;
      
      // Redirect to root (which loads index.html)
      window.location.href = '/amal_sreena_wedding/';
    </script>
  </head>
  <body></body>
</html>
